<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="512" height="512" fill="#1a1a2e"/>
  
  <!-- 外框 -->
  <rect x="20" y="20" width="472" height="472" fill="none" stroke="#D4AF37" stroke-width="8"/>
  
  <!-- 故宫角楼俯视图 -->
  <!-- 基座 -->
  <rect x="156" y="156" width="200" height="200" fill="none" stroke="#D4AF37" stroke-width="4"/>
  
  <!-- 十字形主体 -->
  <rect x="196" y="96" width="120" height="320" fill="#D4AF37" opacity="0.3"/>
  <rect x="96" y="196" width="320" height="120" fill="#D4AF37" opacity="0.3"/>
  
  <!-- 中心 -->
  <rect x="196" y="196" width="120" height="120" fill="#D4AF37" opacity="0.5"/>
  
  <!-- 四角飞檐 -->
  <path d="M 156 156 L 96 96 L 156 96 Z" fill="#D4AF37" opacity="0.6"/>
  <path d="M 356 156 L 416 96 L 356 96 Z" fill="#D4AF37" opacity="0.6"/>
  <path d="M 156 356 L 96 416 L 156 416 Z" fill="#D4AF37" opacity="0.6"/>
  <path d="M 356 356 L 416 416 L 356 416 Z" fill="#D4AF37" opacity="0.6"/>
  
  <!-- 屋顶层次 -->
  <rect x="176" y="176" width="160" height="160" fill="none" stroke="#D4AF37" stroke-width="3"/>
  <rect x="216" y="136" width="80" height="240" fill="none" stroke="#D4AF37" stroke-width="2"/>
  <rect x="136" y="216" width="240" height="80" fill="none" stroke="#D4AF37" stroke-width="2"/>
  
  <!-- 中心宝顶 -->
  <circle cx="256" cy="256" r="40" fill="none" stroke="#D4AF37" stroke-width="4"/>
  <circle cx="256" cy="256" r="20" fill="#D4AF37"/>
  
  <!-- 装饰图案 - 九梁十八柱七十二脊示意 -->
  <line x1="156" y1="156" x2="356" y2="356" stroke="#D4AF37" stroke-width="1" opacity="0.3"/>
  <line x1="356" y1="156" x2="156" y2="356" stroke="#D4AF37" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="96" x2="256" y2="416" stroke="#D4AF37" stroke-width="1" opacity="0.3"/>
  <line x1="96" y1="256" x2="416" y2="256" stroke="#D4AF37" stroke-width="1" opacity="0.3"/>
  
  <!-- 四角装饰 -->
  <circle cx="64" cy="64" r="24" fill="none" stroke="#D4AF37" stroke-width="3"/>
  <circle cx="448" cy="64" r="24" fill="none" stroke="#D4AF37" stroke-width="3"/>
  <circle cx="64" cy="448" r="24" fill="none" stroke="#D4AF37" stroke-width="3"/>
  <circle cx="448" cy="448" r="24" fill="none" stroke="#D4AF37" stroke-width="3"/>
  
  <!-- 文字标识 -->
  <text x="256" y="480" text-anchor="middle" fill="#D4AF37" font-size="24" font-family="serif">故宫角楼</text>
</svg>