<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="512" height="512" fill="#1a1a2e"/>
  
  <!-- 外框 -->
  <rect x="20" y="20" width="472" height="472" fill="none" stroke="#D4AF37" stroke-width="8"/>
  
  <!-- 古塔俯视图 -->
  <!-- 塔基 -->
  <polygon points="256,80 420,432 92,432" fill="none" stroke="#D4AF37" stroke-width="4"/>
  
  <!-- 塔身层级 -->
  <polygon points="256,120 380,380 132,380" fill="#D4AF37" opacity="0.2"/>
  <polygon points="256,160 340,320 172,320" fill="#D4AF37" opacity="0.3"/>
  <polygon points="256,200 300,260 212,260" fill="#D4AF37" opacity="0.4"/>
  
  <!-- 塔檐层次 -->
  <line x1="256" y1="120" x2="380" y2="380" stroke="#D4AF37" stroke-width="2"/>
  <line x1="256" y1="120" x2="132" y2="380" stroke="#D4AF37" stroke-width="2"/>
  <line x1="380" y1="380" x2="92" y2="432" stroke="#D4AF37" stroke-width="2"/>
  <line x1="132" y1="380" x2="420" y2="432" stroke="#D4AF37" stroke-width="2"/>
  
  <!-- 塔刹（顶部） -->
  <circle cx="256" cy="256" r="60" fill="none" stroke="#D4AF37" stroke-width="3"/>
  <circle cx="256" cy="256" r="40" fill="none" stroke="#D4AF37" stroke-width="2"/>
  <circle cx="256" cy="256" r="20" fill="#D4AF37"/>
  
  <!-- 装饰性飞檐 -->
  <path d="M 180 300 Q 200 280 220 300" fill="none" stroke="#D4AF37" stroke-width="2"/>
  <path d="M 292 300 Q 312 280 332 300" fill="none" stroke="#D4AF37" stroke-width="2"/>
  <path d="M 180 340 Q 200 320 220 340" fill="none" stroke="#D4AF37" stroke-width="2"/>
  <path d="M 292 340 Q 312 320 332 340" fill="none" stroke="#D4AF37" stroke-width="2"/>
  
  <!-- 塔门 -->
  <rect x="236" y="380" width="40" height="52" fill="#D4AF37" opacity="0.5"/>
  <circle cx="256" cy="406" r="16" fill="#D4AF37" opacity="0.7"/>
  
  <!-- 装饰性窗格 -->
  <rect x="200" y="280" width="24" height="24" fill="none" stroke="#D4AF37" stroke-width="1"/>
  <rect x="288" y="280" width="24" height="24" fill="none" stroke="#D4AF37" stroke-width="1"/>
  <rect x="220" y="240" width="20" height="20" fill="none" stroke="#D4AF37" stroke-width="1"/>
  <rect x="272" y="240" width="20" height="20" fill="none" stroke="#D4AF37" stroke-width="1"/>
  
  <!-- 四角装饰 -->
  <circle cx="64" cy="64" r="24" fill="none" stroke="#D4AF37" stroke-width="3"/>
  <circle cx="448" cy="64" r="24" fill="none" stroke="#D4AF37" stroke-width="3"/>
  <circle cx="64" cy="448" r="24" fill="none" stroke="#D4AF37" stroke-width="3"/>
  <circle cx="448" cy="448" r="24" fill="none" stroke="#D4AF37" stroke-width="3"/>
  
  <!-- 文字标识 -->
  <text x="256" y="480" text-anchor="middle" fill="#D4AF37" font-size="24" font-family="serif">古塔</text>
</svg>