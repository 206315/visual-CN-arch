<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="512" height="512" fill="#1a1a2e"/>
  
  <!-- 外框 -->
  <rect x="20" y="20" width="472" height="472" fill="none" stroke="#D4AF37" stroke-width="8"/>
  
  <!-- 赵州桥俯视图 -->
  <!-- 桥身主体 -->
  <ellipse cx="256" cy="256" rx="200" ry="80" fill="none" stroke="#D4AF37" stroke-width="6"/>
  
  <!-- 主拱 -->
  <path d="M 56 256 Q 256 120 456 256" fill="none" stroke="#D4AF37" stroke-width="8"/>
  
  <!-- 小拱（敞肩拱） -->
  <ellipse cx="150" cy="240" rx="30" ry="20" fill="none" stroke="#D4AF37" stroke-width="4"/>
  <ellipse cx="256" cy="220" rx="35" ry="25" fill="none" stroke="#D4AF37" stroke-width="4"/>
  <ellipse cx="362" cy="240" rx="30" ry="20" fill="none" stroke="#D4AF37" stroke-width="4"/>
  
  <!-- 桥面 -->
  <rect x="56" y="240" width="400" height="32" fill="#D4AF37" opacity="0.4"/>
  
  <!-- 桥栏杆 -->
  <line x1="56" y1="220" x2="456" y2="220" stroke="#D4AF37" stroke-width="3"/>
  <line x1="56" y1="292" x2="456" y2="292" stroke="#D4AF37" stroke-width="3"/>
  
  <!-- 栏杆柱子 -->
  <line x1="100" y1="220" x2="100" y2="240" stroke="#D4AF37" stroke-width="2"/>
  <line x1="150" y1="220" x2="150" y2="240" stroke="#D4AF37" stroke-width="2"/>
  <line x1="200" y1="220" x2="200" y2="240" stroke="#D4AF37" stroke-width="2"/>
  <line x1="256" y1="220" x2="256" y2="240" stroke="#D4AF37" stroke-width="2"/>
  <line x1="312" y1="220" x2="312" y2="240" stroke="#D4AF37" stroke-width="2"/>
  <line x1="362" y1="220" x2="362" y2="240" stroke="#D4AF37" stroke-width="2"/>
  <line x1="412" y1="220" x2="412" y2="240" stroke="#D4AF37" stroke-width="2"/>
  
  <!-- 水面波纹 -->
  <path d="M 80 340 Q 120 330 160 340" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.5"/>
  <path d="M 200 360 Q 240 350 280 360" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.5"/>
  <path d="M 320 340 Q 360 330 400 340" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.5"/>
  
  <!-- 四角装饰 -->
  <circle cx="64" cy="64" r="24" fill="none" stroke="#D4AF37" stroke-width="3"/>
  <circle cx="448" cy="64" r="24" fill="none" stroke="#D4AF37" stroke-width="3"/>
  <circle cx="64" cy="448" r="24" fill="none" stroke="#D4AF37" stroke-width="3"/>
  <circle cx="448" cy="448" r="24" fill="none" stroke="#D4AF37" stroke-width="3"/>
  
  <!-- 文字标识 -->
  <text x="256" y="480" text-anchor="middle" fill="#D4AF37" font-size="24" font-family="serif">赵州桥</text>
</svg>