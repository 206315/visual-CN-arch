<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#D4AF37" stroke-width="2"/>
    </pattern>
  </defs>
  
  <!-- 背景 -->
  <rect width="512" height="512" fill="#1a1a2e"/>
  
  <!-- 外框 -->
  <rect x="20" y="20" width="472" height="472" fill="none" stroke="#D4AF37" stroke-width="8"/>
  
  <!-- 四合院俯视图 -->
  <!-- 外院墙 -->
  <rect x="96" y="96" width="320" height="320" fill="none" stroke="#D4AF37" stroke-width="6"/>
  
  <!-- 内院（天井） -->
  <rect x="192" y="192" width="128" height="128" fill="#D4AF37" opacity="0.3"/>
  
  <!-- 北房（正房） -->
  <rect x="128" y="96" width="256" height="64" fill="#D4AF37" opacity="0.6"/>
  
  <!-- 南房（倒座） -->
  <rect x="128" y="352" width="256" height="64" fill="#D4AF37" opacity="0.6"/>
  
  <!-- 东厢房 -->
  <rect x="96" y="160" width="64" height="192" fill="#D4AF37" opacity="0.5"/>
  
  <!-- 西厢房 -->
  <rect x="352" y="160" width="64" height="192" fill="#D4AF37" opacity="0.5"/>
  
  <!-- 中心装饰 -->
  <circle cx="256" cy="256" r="32" fill="none" stroke="#D4AF37" stroke-width="4"/>
  <circle cx="256" cy="256" r="16" fill="#D4AF37"/>
  
  <!-- 四角装饰 -->
  <circle cx="64" cy="64" r="24" fill="none" stroke="#D4AF37" stroke-width="3"/>
  <circle cx="448" cy="64" r="24" fill="none" stroke="#D4AF37" stroke-width="3"/>
  <circle cx="64" cy="448" r="24" fill="none" stroke="#D4AF37" stroke-width="3"/>
  <circle cx="448" cy="448" r="24" fill="none" stroke="#D4AF37" stroke-width="3"/>
  
  <!-- 文字标识 -->
  <text x="256" y="480" text-anchor="middle" fill="#D4AF37" font-size="24" font-family="serif">四合院</text>
</svg>